name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test + lint (stable)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked
      - run: cargo clippy --workspace --all-features --all-targets --locked -- -D warnings
      - run: cargo fmt --check
      - name: rustdoc (deny warnings)
        run: RUSTDOCFLAGS="-D warnings" cargo doc --workspace --all-features --no-deps --locked

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --locked

  # lib must build without the optional serde feature too
  feature-matrix:
    name: lib without default features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check -p machine-krb --locked

  audit:
    name: cargo audit (RUSTSEC advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit

  packages:
    name: rpm / deb / apk (static musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: install nfpm
        run: |
          curl -sSfLo /tmp/nfpm.deb \
            https://github.com/goreleaser/nfpm/releases/download/v2.47.0/nfpm_2.47.0_amd64.deb
          sudo dpkg -i /tmp/nfpm.deb
      - run: make packages
      - name: sanity — package contents
        run: |
          dpkg-deb -c dist/*.deb
          tar -tzf dist/*.apk | head -20
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: dist/*
          retention-days: 14
