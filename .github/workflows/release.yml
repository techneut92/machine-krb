# Tag-driven release: push a tag like `service-v0.1.0` to build the static
# binary + rpm/deb/apk and attach them to a GitHub release.
#
# The library crate is published to crates.io MANUALLY (deliberately — the
# token stays off CI).
name: Release

on:
  push:
    tags:
      - "service-v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - name: install nfpm
        run: |
          curl -sSfLo /tmp/nfpm.deb \
            https://github.com/goreleaser/nfpm/releases/download/v2.47.0/nfpm_2.47.0_amd64.deb
          sudo dpkg -i /tmp/nfpm.deb
      - name: tests must pass before anything ships
        run: cargo test --workspace --all-features --locked
      - run: make packages
      - name: attach static binary too
        run: |
          cp target/x86_64-unknown-linux-musl/release/machine-krb-service \
             dist/machine-krb-service-x86_64-linux-musl
      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

  # COPR rebuilds from git (make_srpm via .copr/Makefile) for Fedora/EPEL;
  # the webhook URL is the credential and never expires. Gated on the release
  # job so a broken tag never publishes. Builds main HEAD — tag on main only.
  copr:
    name: COPR builds (Fedora/EPEL)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: trigger COPR SCM rebuild
        run: curl -sSf -X POST "${{ secrets.COPR_WEBHOOK_URL }}" -o /dev/null

  # OBS builds the Debian/Ubuntu apt repos from a source package we assemble
  # here (vendored crates — OBS builders are offline) and osc-commit to
  # home:Techneut92:machine-krb. Needs OBS_USERNAME / OBS_PASSWORD secrets.
  obs:
    name: OBS upload (Debian/Ubuntu)
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: tag must match debian/changelog
        run: |
          tag="${GITHUB_REF_NAME#service-v}"
          ver="$(dpkg-parsechangelog -SVersion | sed 's/-[0-9][^-]*$//')"
          if [ "$tag" != "$ver" ]; then
            echo "tag service-v$tag does not match debian/changelog version $ver — bump debian/changelog" >&2
            exit 1
          fi
      - name: install osc
        run: sudo apt-get update -q && sudo apt-get install -y -q osc
      - name: build debian source artifacts
        run: packaging/make-obs-debsrc.sh dist/obs
      - name: commit to OBS
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
        run: |
          mkdir -p ~/.config/osc
          printf '[general]\napiurl = https://api.opensuse.org\n\n[https://api.opensuse.org]\nuser = %s\npass = %s\ncredentials_mgr_class = osc.credentials.PlaintextConfigFileCredentialsManager\n' \
            "$OBS_USERNAME" "$OBS_PASSWORD" > ~/.config/osc/oscrc
          chmod 600 ~/.config/osc/oscrc
          osc checkout home:Techneut92:machine-krb machine-krb-service
          cd home:Techneut92:machine-krb/machine-krb-service
          rm -f machine-krb-service_*
          cp "$GITHUB_WORKSPACE"/dist/obs/machine-krb-service_* .
          osc addremove
          osc commit -m "machine-krb-service ${GITHUB_REF_NAME#service-v} (automated from $GITHUB_REF_NAME)"
