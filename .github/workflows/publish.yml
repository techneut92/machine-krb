# Publish the machine-krb library to crates.io — ONLY on lib-v* tags.
# Uses the CARGO_REGISTRY_TOKEN repo secret (scoped: publish-new +
# publish-update, crate pattern machine-krb*).
name: Publish (crates.io)

on:
  push:
    tags:
      - "lib-v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: tag must match the crate version
        run: |
          tag="${GITHUB_REF_NAME#lib-v}"
          ver="$(sed -n 's/^version = "\(.*\)"/\1/p' crates/machine-krb/Cargo.toml | head -1)"
          if [ "$tag" != "$ver" ]; then
            echo "tag lib-v$tag does not match crates/machine-krb version $ver" >&2
            exit 1
          fi
      - name: tests gate the publish
        run: cargo test -p machine-krb --all-features --locked
      - name: publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p machine-krb --locked
