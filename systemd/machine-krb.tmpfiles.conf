# Create the machine-ticket cache directory at boot (installed to
# /etc/tmpfiles.d/machine-krb.conf by `make install`).
#
# tmpfiles.d instead of RuntimeDirectory= on purpose: systemd recursively
# resets a RuntimeDirectory's ownership to the unit's User=/Group= (root:root
# here) on EVERY activation, which would undo the config-driven group the
# binary sets and lock consumers out of a still-valid ticket between runs.
#
# The group here only matters for boot-time creation; the service re-chowns
# the directory and cache to the group configured in
# /etc/machine-krb/config.yaml on every run.
d /run/machine-krb 0750 root machine-krb -
